# Taxonomie de themes pour classer les sources, datasets et papiers.

version: 0.1

policy:
  note: >
    Les themes sont des aides de routage pour le KG. Ils ne remplacent pas la
    lecture des sources primaires. Les themes issus de titres ou mots-cles sont
    provisoires; ils deviennent fiables apres verification par contenu, graphe
    voisin et revue humaine.
  stages:
    - name: seed_from_title_or_catalog
      output_field: kg_topic
      status: provisional
    - name: inferred_from_content
      output_field: kg_topic_final
      status: inferred
    - name: manual_review
      output_field: kg_topic_final
      status: reviewed

topics:
  package-dataset:
    label: "Datasets embarques dans packages R/Python"
    seed_terms:
      - package
      - dataset
      - r package
      - python package
      - cran
      - geodatasets

  scientific-open-data:
