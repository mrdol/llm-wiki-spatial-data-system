[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = [
    ".venv",
    "__pycache__",
    ".pytest_cache",
    ".eval",
    ".codex_memory",
    "data",
    "raw",
    "wiki",
    "**/*.ipynb",
]

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"Code_scrapping/pipeline_lit/*.py" = ["E402"]
"Code_scrapping/pipeline_portals/python/*.py" = ["E402"]
"LLM-wiki-Assessment/eval/run_eval.py" = ["E402"]
