# Registre manuel des sources du corpus KG.
# Ce fichier ne remplace pas JabRef: il liste les familles de sources
# que le KG peut lire.

sources:
  bib:
    path: corpus/bib/references.bib
    role: bibliographie JabRef canonique

  raw_pdf:
    path: corpus/papers/raw_pdf
    role: PDF scientifiques lus par GROBID

  tei:
    path: corpus/papers/tei
    role: sorties TEI XML generees par GROBID

  web_md:
    path: corpus/web_md
    role: pages web converties en Markdown, sans passer par GROBID

  r_dataset_docs:
    path: wiki/datasets/r_package_docs
    role: documentation des jeux de donnees de packages R
